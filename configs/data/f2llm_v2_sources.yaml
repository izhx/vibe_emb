notes:
- The original 121 sources are transcribed from ML-Embed appendix Tables 8 and 9.
- The expanded 157-source profile is transcribed from F2LLM-v2 training-data Tables 1 and 2.
- Language- or direction-specific physical files are explicit independent sampling units.
- F2LLM-v2 groups UNPC, ParaCrawl, and CLIRMatrix direction shards by paper-level source; this is the 80k grouping that reproduces the reported approximately 18M mixture.
- mela.parquet is the release-time concatenation of MELA, ScaLA, and DaLA; exact paper-size row ranges preserve the three source boundaries.
