model:
  model_name_or_path: /mnt/share/models/Qwen3-0.6B
  trust_remote_code: true
  pooling: last_token
  normalize_embeddings: true
  peft_config:
    type: LoraConfig
    params:
      r: 64
      lora_alpha: 64
      lora_dropout: 0.0
      target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, down_proj, up_proj]
      bias: none
  save_merged_lora_model: false

data:
  indexed_dataset_manifest: data/processed/f2llm_stage2_80k_arrow/manifest.json
  datasets: []
  default_query_max_len: 1024
  default_passage_max_len: 1024
  default_batch_size: 32
  pad_to_multiple_of: 8
  append_eos_token: false
  same_dataset_within_batch: true
  arrow_open_mode: lazy
  arrow_max_open_units: 4
  arrow_prefetch_units: 0
  arrow_verify_mode: lazy
  unit_block_batches: 8
  task_defaults:
    retrieval:
      train_group_size: 8
      no_in_batch_neg: false
    clustering:
      train_group_size: 8
      no_in_batch_neg: true
    classification:
      train_group_size: 2
      no_in_batch_neg: true

training:
  output_dir: results/f2llm-s2-lora64
  # overwrite_output_dir: true
  do_train: true
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-5
  warmup_steps: 500
  optim: adamw_torch
  bf16: true
  gradient_checkpointing: true
  logging_steps: 1
  save_strategy: steps
  save_steps: 500
  dataloader_drop_last: true
  dataloader_num_workers: 0
  dataloader_pin_memory: true
  ddp_find_unused_parameters: false
  remove_unused_columns: false
  report_to: tensorboard
  temperature: 0.05
  negatives_cross_device: true
  sub_batch_size: 0
